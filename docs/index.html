<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Diccionario de Procedimientos</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Sistema unificado de procedimientos y automatizaciones">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📚</text></svg>">

  <!-- Tema Docsify -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <!-- Estilos principales -->
  <link rel="stylesheet" href="/diseñoIndex.css">

  <!-- Mejoras responsive -->
  <link rel="stylesheet" href="/responsive-fixes.css">

  <!-- Tour CSS -->
  <link rel="stylesheet" href="/tour.css">
</head>
<body>
  <div id="app">Cargando...</div>

  <!-- ─────────────────────────────────────
       CONFIGURACIÓN DOCSIFY
  ───────────────────────────────────────── -->
  <script>
    window.$docsify = {
      name: '<i class="bi bi-journal-bookmark-fill"></i> Diccionario de Procedimientos',
      repo: '',
      loadSidebar: true,
      hideSidebar: false,
      subMaxLevel: 1,
      auto2top: true,
      executeScript: true,
      maxLevel: 4,

      toc: {
        tocMaxLevel: 0,
        target: 'h2'
      },

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 Buscar procedimientos...',
        noData: 'No se encontraron resultados',
        depth: 6,
        hideOtherSidebarContent: false,
      },

      pagination: {
        previousText: 'Anterior',
        nextText: 'Siguiente',
      },

      copyCode: {
        buttonText: 'Copiar',
        errorText: 'Error',
        successText: '✓ Copiado'
      },

      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
      },

      plugins: [

        // Cerrar modal PDF al cambiar de página
        function(hook) {
          hook.beforeEach(function(content) {
            var modal = document.getElementById('pdf-modal');
            if (modal && modal.classList.contains('active')) {
              modal.classList.remove('active');
              var iframe = document.getElementById('modal-iframe');
              if (iframe) iframe.src = '';
              document.body.style.overflow = '';
            }
            return content;
          });
        },

        // Menú colapsable del sidebar
        function(hook) {
          hook.doneEach(function() {
            setTimeout(function() {
              var currentHash = window.location.hash || '';
              var topItems = document.querySelectorAll('.sidebar-nav > ul > li');

              topItems.forEach(function(li) {
                var p = li.querySelector(':scope > p');
                var ul = li.querySelector(':scope > ul');

                if (!p || !ul) return;

                if (!p.getAttribute('data-collapsible')) {
                  p.setAttribute('data-collapsible', 'true');
                  p.addEventListener('click', function() {
                    li.classList.toggle('collapsed');
                  });
                }

                var links = li.querySelectorAll('a');
                var tieneActivo = false;
                links.forEach(function(a) {
                  var href = a.getAttribute('href') || '';
                  if (currentHash.indexOf(href.replace(/^#/, '')) !== -1 && href.length > 2) {
                    tieneActivo = true;
                  }
                });

                if (tieneActivo) {
                  li.classList.remove('collapsed');
                } else {
                  if (!li.getAttribute('data-opened')) {
                    li.classList.add('collapsed');
                  }
                }
              });
            }, 50);
          });
        }

      ]
    }
  </script>

  <!-- ─────────────────────────────────────
       DOCSIFY + PLUGINS
  ───────────────────────────────────────── -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/pdfobject@2.2.8/pdfobject.min.js"></script>

  <!-- ─────────────────────────────────────
       SIDEBAR TOGGLE (móvil)
  ───────────────────────────────────────── -->
  <script src="/sidebar.js"></script>

  <!-- ─────────────────────────────────────
       MODAL PDF
  ───────────────────────────────────────── -->
  <script src="/pdf-modal.js"></script>

  <!-- ─────────────────────────────────────
       AUTENTICACIÓN
  ───────────────────────────────────────── -->
  <script src="/auth.js"></script>

  <!-- ─────────────────────────────────────
       TOUR INTERACTIVO
  ───────────────────────────────────────── -->
  <script src="/tour.js"></script>

  <!-- Botón flotante tour -->
  <button class="btn-start-tour" onclick="startTour()" title="Iniciar guía interactiva">
    <i class="bi bi-question-circle"></i>
  </button>

  <!-- ─────────────────────────────────────
       BOOTSTRAP JS
  ───────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
