<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Diccionario de Procedimientos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <link rel="stylesheet" href="/login.css">
</head>
<body>

  <div class="login-card">

    <!-- ════════════════════════════
         PANEL IZQUIERDO
    ════════════════════════════ -->
    <div class="login-left">
      <!-- Decoración -->
      <div class="circle-top"></div>
      <div class="circle-mid"></div>
      <div class="circle-bot"></div>

      <!-- Contenido superior -->
      <div class="left-top">
        <span class="left-badge">Sistema activo</span>

        <h1 class="left-headline">
          Diccionario<br>
          de<br>
          <em>Procedi&shy;mientos.</em>
        </h1>

        <p class="left-desc">
          Accede al repositorio unificado de procedimientos
          y automatizaciones de tu organización.
        </p>
      </div>

      <!-- Estadísticas inferiores -->
      <div class="left-bottom">
        <div class="left-stat">
          <strong>+120</strong>
          <span>Procedimientos</span>
        </div>
        <div class="stat-divider"></div>
        <div class="left-stat">
          <strong>12</strong>
          <span>Áreas</span>
        </div>
        <div class="stat-divider"></div>
        <div class="left-stat">
          <strong>24/7</strong>
          <span>Disponible</span>
        </div>
      </div>
    </div>

    <!-- ════════════════════════════
         PANEL DERECHO
    ════════════════════════════ -->
    <div class="login-right">

      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <i class="bi bi-journal-bookmark-fill"></i>
        </div>
        <div class="login-logo-text">
          Diccionario de Procedimientos
          <small>Portal interno</small>
        </div>
      </div>

      <h2>Iniciar sesión</h2>
      <p class="login-subtitle">Ingresa tus credenciales para continuar.</p>

      <!-- Alerta -->
      <div id="alert" class="alert" role="alert">
        <i id="alert-icon" class="bi bi-exclamation-circle-fill"></i>
        <span id="alert-msg"></span>
      </div>

      <form id="loginForm" novalidate>

        <!-- Usuario -->
        <div class="form-group">
          <label for="username">Usuario</label>
          <div class="input-wrap">
            <input
              type="text"
              id="username"
              name="username"
              placeholder="usuario@empresa.com"
              required
              autocomplete="username"
            >
            <i class="bi bi-person input-icon"></i>
          </div>
        </div>

        <!-- Contraseña -->
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            >
            <i class="bi bi-lock input-icon"></i>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          Iniciar Sesión
        </button>

      </form>

      <div class="back-link">
        <button onclick="window.location.href='/'">← Volver al inicio</button>
      </div>

    </div>
  </div><!-- /login-card -->

  <!-- ════════════════════════════
       LÓGICA (original intacta)
  ════════════════════════════ -->
  <script>
    const API_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:3001'
      : 'https://diccionario-backend-ahtd.onrender.com';

    const form      = document.getElementById('loginForm');
    const btnLogin  = document.getElementById('btnLogin');
    const alertDiv  = document.getElementById('alert');
    const alertMsg  = document.getElementById('alert-msg');
    const alertIcon = document.getElementById('alert-icon');

    // Si ya está logueado, redirigir
    if (localStorage.getItem('authToken')) {
      window.location.href = '/';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btnLogin.disabled    = true;
      btnLogin.textContent = 'Iniciando sesión...';
      hideAlert();

      try {
        const response = await fetch(`${API_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('authToken', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          showAlert('¡Login exitoso! Redirigiendo…', 'success');

          setTimeout(() => { window.location.href = '/'; }, 1000);
        } else {
          showAlert(data.error || 'Error al iniciar sesión', 'error');
          btnLogin.disabled    = false;
          btnLogin.textContent = 'Iniciar Sesión';
        }
      } catch (err) {
        showAlert('Error de conexión. Verifica que el servidor esté activo.', 'error');
        btnLogin.disabled    = false;
        btnLogin.textContent = 'Iniciar Sesión';
      }
    });

    function showAlert(message, type) {
      alertMsg.textContent = message;
      alertIcon.className  = type === 'error'
        ? 'bi bi-exclamation-circle-fill'
        : 'bi bi-check-circle-fill';
      alertDiv.className = `alert alert-${type} visible`;
    }

    function hideAlert() {
      alertDiv.className = 'alert';
    }
  </script>

</body>
</html>
